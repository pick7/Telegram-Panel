services:
  telegram-panel:
    environment:
      Proxy__Warp__Enabled: "true"
      Proxy__Warp__DockerSocketPath: "/var/run/docker.sock"
      Proxy__Warp__Network: "${TP_WARP_DOCKER_NETWORK:-telegram-panel_default}"
      Proxy__Warp__ProxyHostMode: "container"
      Proxy__Warp__Protocol: "${TP_WARP_PROXY_PROTOCOL:-http}"
      Proxy__Warp__Maintenance__Enabled: "${TP_WARP_AUTO_RECOVERY_ENABLED:-true}"
      Proxy__Warp__Maintenance__HealthCheckIntervalMinutes: "${TP_WARP_HEALTH_CHECK_INTERVAL_MINUTES:-5}"
      Proxy__Warp__Maintenance__FailureThreshold: "${TP_WARP_FAILURE_THRESHOLD:-2}"
      Proxy__Warp__Maintenance__RecoveryCooldownMinutes: "${TP_WARP_RECOVERY_COOLDOWN_MINUTES:-30}"
      Proxy__Warp__Maintenance__ScheduledRefreshEnabled: "${TP_WARP_SCHEDULED_REFRESH_ENABLED:-false}"
      Proxy__Warp__Maintenance__ScheduledRefreshIntervalMinutes: "${TP_WARP_SCHEDULED_REFRESH_INTERVAL_MINUTES:-720}"
    volumes:
      # Docker Socket 可管理宿主全部容器，仅在可信主机显式叠加本文件。
      - /var/run/docker.sock:/var/run/docker.sock
