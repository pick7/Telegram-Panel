name: Release (Auto Changelog)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的 tag（例如 v1.2.3）"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Resolve tag name
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.20.0 --activate

      - name: Test and build Vue admin
        shell: bash
        run: |
          pnpm --dir frontend install --frozen-lockfile
          pnpm --dir frontend run test
          pnpm --dir frontend run build

      - name: Restore
        run: dotnet restore tests/TelegramPanel.Web.Tests/TelegramPanel.Web.Tests.csproj

      - name: Test persistent storage and self update
        run: dotnet test tests/TelegramPanel.Web.Tests/TelegramPanel.Web.Tests.csproj -c Release --no-restore

      - name: Publish Linux update packages
        shell: bash
        run: |
          set -euo pipefail
          dotnet publish src/TelegramPanel.Web/TelegramPanel.Web.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained false \
            -p:UseAppHost=false \
            -o artifacts/linux-x64

          dotnet publish src/TelegramPanel.Web/TelegramPanel.Web.csproj \
            -c Release \
            -r linux-arm64 \
            --self-contained false \
            -p:UseAppHost=false \
            -o artifacts/linux-arm64

          for target in artifacts/linux-x64 artifacts/linux-arm64; do
            test -f "$target/self-update/entrypoint.sh"
            cmp -s docker/entrypoint.sh "$target/self-update/entrypoint.sh"
            sh -n "$target/self-update/entrypoint.sh"
            if LC_ALL=C grep -q $'\r' "$target/self-update/entrypoint.sh"; then
              echo "entrypoint.sh contains CRLF: $target" >&2
              exit 1
            fi

            leaked="$(find "$target" -type f \( \
              -name 'telegram-panel.db' -o \
              -name 'telegram_panel.db' -o \
              -name 'admin_auth.json' -o \
              -name 'appsettings.local.json' -o \
              -name '*.session' \
            \) -print -quit)"
            if [[ -n "$leaked" ]]; then
              echo "persistent user data leaked into release: $leaked" >&2
              exit 1
            fi
          done

      - name: Pack release assets
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare.outputs.tag }}"
          mkdir -p dist

          X64_ZIP="telegram-panel-${TAG}-linux-x64.zip"
          ARM64_ZIP="telegram-panel-${TAG}-linux-arm64.zip"

          (cd artifacts/linux-x64 && zip -rq "../../dist/${X64_ZIP}" .)
          (cd artifacts/linux-arm64 && zip -rq "../../dist/${ARM64_ZIP}" .)

      - name: Upload Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-assets
          path: dist/*
          if-no-files-found: error

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout source at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@10.20.0 --activate

      - name: Build Vue admin
        shell: pwsh
        run: |
          pnpm --dir frontend install --frozen-lockfile
          pnpm --dir frontend run build

      - name: Build Windows installer
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File tools\desktop\build-windows-installer.ps1

      - name: Pack Windows release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $tag = "${{ needs.prepare.outputs.tag }}"
          Copy-Item -LiteralPath artifacts\desktop\TelegramPanel.Setup.exe -Destination "dist\telegram-panel-$tag-windows-x64-setup.exe" -Force

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: dist/*
          if-no-files-found: error

  release:
    needs:
      - prepare
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release with auto changelog
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          append_body: true
          prerelease: ${{ contains(needs.prepare.outputs.tag, '-') }}
          files: |
            dist/*
          body: |
            ## 本次版本主要更新

            > 下方会自动附加完整变更记录（Changelog），这里保留部署与更新入口说明。

            > [!WARNING]
            > 如果当前账号列表已在旧版一键更新后变空，请勿直接再次点击一键更新。
            > 先停止容器并备份宿主机 `docker-data` 与容器内 `/app`；本版可以恢复仍存在的旧库，
            > 但无法重新生成已经被旧更新器或人工操作删除的文件。

            ## 部署与更新

            ### 1. Docker 镜像
            拉取对应 tag 的镜像：

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.tag }}
            ```

            ### 2. 面板内一键更新（Docker）
            路径：`左上角版本号 -> 版本信息弹窗 -> 一键更新并重启`

            ### 3. Windows 桌面版
            下载 `telegram-panel-${{ needs.prepare.outputs.tag }}-windows-x64-setup.exe` 安装包。

            ## 应用内更新资产

            - `telegram-panel-${{ needs.prepare.outputs.tag }}-linux-x64.zip`
            - `telegram-panel-${{ needs.prepare.outputs.tag }}-linux-arm64.zip`
            - `telegram-panel-${{ needs.prepare.outputs.tag }}-windows-x64-setup.exe`

            > 程序会自动匹配容器架构下载更新包，并部署到 `/data/app-current`。
